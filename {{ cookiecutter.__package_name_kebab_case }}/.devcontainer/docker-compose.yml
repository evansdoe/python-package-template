services:
  devcontainer:
    container_name: ${DEVCONTAINER_NAME}
    {%- if cookiecutter.include_gpu %}

    # Give PyTorch workers enough memory!
    shm_size: '20gb'
    {%- endif %}

    # load environment variables from a dotenv file
    env_file:
      - .env
      # uncomment to load secrets from a dotenv file - do not commit
      # optionally add property "optional: true" to ignore if file is missing
      # - .env-secrets

    # necessary to keep devcontainer alive
    entrypoint: "sleep infinity"

    build:
      context: ..
      dockerfile: Dockerfile
      # build to stage 'dev'
      target: dev
      # set args for build process
      args:
        {%- if cookiecutter.include_gpu %}
        # The cuda version specified here must match the one in Dockerfile
        FROM_IMAGE: "nvidia/cuda:12.4.1-runtime-ubuntu22.04"
        {%- endif %}
        VENV_PATH: "/opt/venv"
        PYTHON_VERSION: "{{ cookiecutter.python_version }}"
    {%- if cookiecutter.include_gpu %}

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities:
                - gpu
    {%- endif %}

    volumes:
      # Mounts the project folder to '/workspace'.
      {%- if cookiecutter.is_subproject %}
      - ../../../:/workspace:cached
      {%- else %}
      - ../:/workspace:cached
      {%- endif %}
