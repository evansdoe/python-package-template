{%- if cookiecutter.include_mkdocs | string == "True" -%}
# Deploy MkDocs documentation to GitHub Pages
# Triggered on pushes to main (after CI passes)

name: Deploy Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: false

{%- if cookiecutter.is_subproject | string == "True" %}

defaults:
  run:
    working-directory: src/{{ cookiecutter.__package_name_kebab_case }}
{%- endif %}

jobs:
  build-docs:
    name: Build documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "{{ cookiecutter.uv_version }}"

      - name: Install Python
        run: uv python install {{ cookiecutter.python_version }}

      - name: Install dependencies
        run: uv sync --all-extras --all-groups

      - name: Build docs
        run: uv run mkdocs build --strict --site-dir _site

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          {%- if cookiecutter.is_subproject | string == "True" %}
          path: src/{{ cookiecutter.__package_name_kebab_case }}/_site
          {%- else %}
          path: _site
          {%- endif %}

  deploy-docs:
    name: Deploy to GitHub Pages
    needs: build-docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: {% raw %}${{ steps.deployment.outputs.page_url }}{% endraw %}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
{%- endif %}
