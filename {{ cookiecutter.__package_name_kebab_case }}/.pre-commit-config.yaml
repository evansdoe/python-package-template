# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: debug-statements

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.12
    hooks:
      - id: ruff-format
      - id: ruff
        args: ['--fix']
{%- if cookiecutter.type_checker == "mypy" %}

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        additional_dependencies: []
        args: ['--ignore-missing-imports']
{%- elif cookiecutter.type_checker == "ty" %}

  # ty is still in beta; no official pre-commit mirror yet.
  # See https://github.com/astral-sh/ty for updates.
  - repo: local
    hooks:
      - id: ty
        name: ty (type check)
        entry: ty check --ignore unresolved-import
        language: python
        types: [python]
        pass_filenames: false
        additional_dependencies: ['ty>=0.0.31']
{%- endif %}
