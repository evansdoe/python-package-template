{%- if cookiecutter.is_subproject -%}
# Child pipeline for {{ cookiecutter.package_name }}
# Included from the root .gitlab-ci.yml when files under src/{{ cookiecutter.__package_name_kebab_case }}/ change.
{%- else -%}
# CI pipeline for {{ cookiecutter.package_name }}
{%- endif %}

stages:
{%- if cookiecutter.include_security_scans %}
  - sast
{%- endif %}
  - test
{%- if cookiecutter.include_docker %}
  - build
{%- endif %}
{%- if cookiecutter.include_pypi_publish %}
  - publish
{%- endif %}
{%- if cookiecutter.include_mkdocs %}
  - pages
{%- endif %}
{%- if cookiecutter.include_security_scans %}

include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml
  - template: Security/Dependency-Scanning.gitlab-ci.yml
{%- endif %}

variables:
  {%- if cookiecutter.is_subproject %}
  WORKING_DIR: src/{{ cookiecutter.__package_name_kebab_case }}
  {%- else %}
  WORKING_DIR: .
  {%- endif %}
  PYTHON_VERSION: "{{ cookiecutter.python_version }}"
  UV_VERSION: "{{ cookiecutter.uv_version }}"
  REGISTRY_BASE_URL: ${CI_REGISTRY_IMAGE}/{{ cookiecutter.__package_name_snake_case }}
  UV_CACHE_DIR: .cache/uv
  UV_LINK_MODE: copy

# ──────────────────────────────────────────────────────────────────────────
# Shared defaults for Python jobs
# ──────────────────────────────────────────────────────────────────────────
.python-base:
  image: ghcr.io/astral-sh/uv:${UV_VERSION}-python${PYTHON_VERSION}-bookworm-slim
  before_script:
    - cd $WORKING_DIR
    - uv sync --all-extras --all-groups
  cache:
    key:
      files:
        - ${WORKING_DIR}/uv.lock
    paths:
      - ${WORKING_DIR}/.cache/uv

# ──────────────────────────────────────────────────────────────────────────
# Template drift check (non-blocking)
# ──────────────────────────────────────────────────────────────────────────
cruft-check:
  extends: .python-base
  stage: test
  allow_failure: true
  script:
    - uv run cruft check || echo "WARNING — Project has drifted from the template. Run 'cruft update' to sync."

# ──────────────────────────────────────────────────────────────────────────
# Stage: test — format, lint{{ ", typecheck" if cookiecutter.type_checker != "none" else "" }}, license check, pytest
# ──────────────────────────────────────────────────────────────────────────
format:
  extends: .python-base
  stage: test
  script:
    - uv run black --check .
    - uv run isort --check .

lint:
  extends: .python-base
  stage: test
  script:
    - uv run ruff check .
{%- if cookiecutter.type_checker != "none" %}

typecheck:
  extends: .python-base
  stage: test
  script:
    {%- if cookiecutter.type_checker == "mypy" %}
    - uv run mypy .
    {%- elif cookiecutter.type_checker == "ty" %}
    - uv run ty check .
    {%- endif %}
{%- endif %}

license-check:
  extends: .python-base
  stage: test
  script:
    - uv run poe check_licenses
  artifacts:
    when: always
    paths:
      - ${WORKING_DIR}/liccheck_reporting.txt
    expire_in: 1 week

test:
  extends: .python-base
  stage: test
  script:
    - uv run poe test
  coverage: '/(?i)total.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/'
  artifacts:
    when: always
    paths:
      - ${WORKING_DIR}/htmlcov/
      - ${WORKING_DIR}/coverage.xml
      - ${WORKING_DIR}/python-junit.xml
    reports:
      junit: ${WORKING_DIR}/python-junit.xml
      coverage_report:
        coverage_format: cobertura
        path: ${WORKING_DIR}/coverage.xml
    expire_in: 1 week
{%- if cookiecutter.include_docker %}

# ──────────────────────────────────────────────────────────────────────────
# Stage: build — Docker images via Kaniko (rootless)
# ──────────────────────────────────────────────────────────────────────────
.kaniko-build:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [""]
  before_script: []
  cache: []
  variables:
    IMAGE_TAG: ${CI_COMMIT_SHORT_SHA}
  script:
    - /kaniko/executor
      --context "${CI_PROJECT_DIR}/${WORKING_DIR}"
      --dockerfile "${CI_PROJECT_DIR}/${WORKING_DIR}/Dockerfile"
      --target ${BUILD_TARGET}
      --build-arg VENV_PATH=/opt/venv
      --build-arg PYTHON_VERSION=${PYTHON_VERSION}
      --destination "${REGISTRY_BASE_URL}/${BUILD_TARGET}:${IMAGE_TAG}"
      --destination "${REGISTRY_BASE_URL}/${BUILD_TARGET}:latest"
      --cache=true
      --cache-repo=${REGISTRY_BASE_URL}/cache
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_BRANCH == "dev"'
    - when: manual
      allow_failure: true

build-image:
  extends: .kaniko-build
  variables:
    BUILD_TARGET: build

build-dev-image:
  extends: .kaniko-build
  needs: [build-image]
  variables:
    BUILD_TARGET: dev

build-runtime-image:
  extends: .kaniko-build
  needs:
    - job: test
    - job: format
    - job: lint
{%- if cookiecutter.type_checker != "none" %}
    - job: typecheck
{%- endif %}
    - job: license-check
    - job: build-image
  variables:
    BUILD_TARGET: runtime
{%- endif %}
{%- if cookiecutter.include_pypi_publish %}

# ──────────────────────────────────────────────────────────────────────────
# Stage: publish — build and publish to PyPI (or GitLab Package Registry)
# Triggered on protected tags matching v*
# ──────────────────────────────────────────────────────────────────────────
publish-package:
  extends: .python-base
  stage: publish
  script:
    - uv build
    # To publish to PyPI: configure UV_PUBLISH_TOKEN as a protected/masked CI/CD variable
    # - uv publish --token $UV_PUBLISH_TOKEN
    # To publish to GitLab Package Registry instead:
    - uv publish
        --publish-url ${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/pypi
        --username gitlab-ci-token
        --password ${CI_JOB_TOKEN}
  artifacts:
    paths:
      - ${WORKING_DIR}/dist/
    expire_in: 1 month
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/'
{%- endif %}

{%- if cookiecutter.include_mkdocs %}

# ──────────────────────────────────────────────────────────────────────────
# Stage: pages — deploy MkDocs to GitLab Pages
# ──────────────────────────────────────────────────────────────────────────
pages:
  extends: .python-base
  stage: pages
  script:
    - uv run mkdocs build --strict --site-dir public
  artifacts:
    paths:
      - ${WORKING_DIR}/public
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
{%- endif %}
