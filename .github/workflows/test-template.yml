# Test the cookiecutter template across all parameter permutations.
# Runs on every push and PR to ensure template changes don't break generation.

name: Test Template

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Fast tests: file existence, YAML validity, Jinja leak detection
  test-matrix:
    name: Test template generation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.12"
          enable-cache: true

      - name: Install Python
        run: uv python install 3.13

      - name: Install testing dependencies
        run: uv sync --all-extras --all-groups

      - name: Run template tests (fast)
        run: uv run pytest tests/ -n auto -v -m "not slow"

  # Slow tests: actually run uv sync inside generated projects
  test-integration:
    name: Integration tests (uv sync)
    runs-on: ubuntu-latest
    needs: test-matrix
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.12"
          enable-cache: true

      - name: Install Python
        run: uv python install 3.13

      - name: Install testing dependencies
        run: uv sync --all-extras --all-groups

      - name: Run integration tests
        run: uv run pytest tests/ -v -m slow --run-slow
